<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 16px;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 11px;
      box-sizing: border-box;
      font-family: 'Monaco', 'Courier New', monospace;
      resize: vertical;
      min-height: 200px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #18A0FB;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #0D8FE8;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    #status.success {
      background: #E8F5E9;
      color: #2E7D32;
      display: block;
    }
    #status.error {
      background: #FFEBEE;
      color: #C62828;
      display: block;
    }
    #status.loading {
      background: #E3F2FD;
      color: #1565C0;
      display: block;
    }
    .help-text {
      font-size: 10px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>OKScale to Figma</h2>
  
  <div class="input-group">
    <label>Paste JSON Data</label>
    <textarea id="jsonData" placeholder='{"url": "...", "timestamp": "...", "dom": {...}}'></textarea>
    <div class="help-text">从 ./output/latest.json 复制 JSON 数据</div>
  </div>

  <button id="import">Create Figma Nodes</button>
  
  <div id="status"></div>

  <script>
    const jsonDataInput = document.getElementById('jsonData');
    const importBtn = document.getElementById('import');
    const status = document.getElementById('status');

    // Load last used JSON
    parent.postMessage({ pluginMessage: { type: 'load-data' } }, '*');

    // Import
    importBtn.onclick = () => {
      const jsonText = jsonDataInput.value.trim();
      if (!jsonText) {
        showStatus('error', 'Please paste JSON data');
        return;
      }

      // Validate JSON
      try {
        JSON.parse(jsonText);
      } catch (e) {
        showStatus('error', 'Invalid JSON format');
        return;
      }

      showStatus('loading', 'Creating Figma nodes...');
      importBtn.disabled = true;

      parent.postMessage({ 
        pluginMessage: { 
          type: 'import',
          jsonData: jsonText
        } 
      }, '*');
    };

    // Handle messages from plugin
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'data-loaded') {
        if (msg.jsonData) jsonDataInput.value = msg.jsonData;
      } else if (msg.type === 'import-complete') {
        showStatus('success', `✅ Created ${msg.nodeCount} nodes`);
        importBtn.disabled = false;
      } else if (msg.type === 'import-error') {
        showStatus('error', `❌ ${msg.error}`);
        importBtn.disabled = false;
      }
    };

    function showStatus(type, message) {
      status.className = type;
      status.textContent = message;
    }
  </script>
</body>
</html>
