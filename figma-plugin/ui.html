<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 16px;
      margin: 0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border-bottom: 1px solid #ddd;
    }
    .tab {
      padding: 8px 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 12px;
      color: #666;
    }
    .tab.active {
      color: #18A0FB;
      border-bottom-color: #18A0FB;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .input-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #666;
      margin-bottom: 4px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #18A0FB;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover {
      background: #0D8FE8;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    button.secondary {
      background: #f0f0f0;
      color: #333;
    }
    button.secondary:hover {
      background: #e0e0e0;
    }
    #status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      display: none;
    }
    #status.success {
      background: #E8F5E9;
      color: #2E7D32;
      display: block;
    }
    #status.error {
      background: #FFEBEE;
      color: #C62828;
      display: block;
    }
    #status.loading {
      background: #E3F2FD;
      color: #1565C0;
      display: block;
    }
    .help-text {
      font-size: 10px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>OKScale to Figma</h2>
  
  <div class="tabs">
    <button class="tab active" data-tab="import">Import</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- Import Tab -->
  <div class="tab-content active" id="import-tab">
    <div class="input-group">
      <label>Paste JSON Data</label>
      <textarea id="jsonData" placeholder='{"url": "...", "timestamp": "...", "dom": {...}}'></textarea>
      <div class="help-text">从脚本输出复制 JSON 数据</div>
    </div>

    <button id="import">Create Figma Nodes</button>
  </div>

  <!-- Settings Tab -->
  <div class="tab-content" id="settings-tab">
    <div class="input-group">
      <label>Notion Integration Token</label>
      <textarea id="notionToken" placeholder="secret_..."></textarea>
      <div class="help-text">从 notion.so/my-integrations 获取</div>
    </div>

    <button id="saveSettings" class="secondary">Save Settings</button>
  </div>
  
  <div id="status"></div>

  <script>
    const jsonDataInput = document.getElementById('jsonData');
    const notionTokenInput = document.getElementById('notionToken');
    const importBtn = document.getElementById('import');
    const saveSettingsBtn = document.getElementById('saveSettings');
    const status = document.getElementById('status');

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        
        // Update tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        
        // Update content
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`${tabName}-tab`).classList.add('active');
        
        // Clear status when switching tabs
        status.style.display = 'none';
      });
    });

    // Load saved values
    parent.postMessage({ pluginMessage: { type: 'load-settings' } }, '*');

    // Save settings
    saveSettingsBtn.onclick = () => {
      const token = notionTokenInput.value.trim();
      if (!token) {
        showStatus('error', 'Please enter a Notion token');
        return;
      }

      parent.postMessage({ 
        pluginMessage: { 
          type: 'save-settings',
          notionToken: token
        } 
      }, '*');
    };

    // Import
    importBtn.onclick = () => {
      const jsonText = jsonDataInput.value.trim();
      if (!jsonText) {
        showStatus('error', 'Please paste JSON data');
        return;
      }

      // Validate JSON
      try {
        JSON.parse(jsonText);
      } catch (e) {
        showStatus('error', 'Invalid JSON format');
        return;
      }

      showStatus('loading', 'Creating Figma nodes...');
      importBtn.disabled = true;

      parent.postMessage({ 
        pluginMessage: { 
          type: 'import',
          jsonData: jsonText
        } 
      }, '*');
    };

    // Handle messages from plugin
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'settings-loaded') {
        if (msg.jsonData) jsonDataInput.value = msg.jsonData;
        if (msg.notionToken) notionTokenInput.value = msg.notionToken;
      } else if (msg.type === 'settings-saved') {
        showStatus('success', '✅ Settings saved');
      } else if (msg.type === 'import-complete') {
        showStatus('success', `✅ Created ${msg.nodeCount} nodes`);
        importBtn.disabled = false;
      } else if (msg.type === 'import-error') {
        showStatus('error', `❌ ${msg.error}`);
        importBtn.disabled = false;
      }
    };

    function showStatus(type, message) {
      status.className = type;
      status.textContent = message;
    }
  </script>
</body>
</html>
